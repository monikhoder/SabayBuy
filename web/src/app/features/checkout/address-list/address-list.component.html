<div class="space-y-4 mb-4">
  <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Select Delivery Address</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    @for (address of accountService.currentUser()?.addresses; track address.id) {
      <div class="relative">
        <input
          type="radio"
          name="selectedAddress"
          [id]="'address-' + address.id"
          [value]="address.id"
          [checked]="address.id === selectedAddressId()"
          (change)="selectAddress(address)"
          class="absolute top-4 left-4 h-5 w-5 text-primary-600 border-gray-300 focus:ring-primary-500 dark:focus:ring-primary-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600"
        />

        <label
          [for]="'address-' + address.id"
          class="block p-4 border rounded-lg cursor-pointer transition-all duration-200 hover:border-primary-500 dark:hover:border-primary-400 min-h-[140px]"
        >
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-2">
                <h3 class="font-medium text-gray-900 dark:text-white ml-6">
                  {{ address.fullName }}
                </h3>
                @if (address.isDefault) {
                  <span
                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300"
                  >
                    Default
                  </span>
                }
              </div>

              <div class="space-y-1 text-sm text-gray-600 dark:text-gray-400">
                <p class="font-medium">{{ address.line1 }}</p>
                @if (address.line2) {
                  <p>{{ address.line2 }}</p>
                }
                <p>{{ address.city }}, {{ address.state }} {{ address.zipCode }}</p>
                <p>{{ address.country }}</p>
                <div class="flex justify-between">
                  <p class="mt-2 flex items-center gap-1">
                    <svg
                      class="w-4 h-4"
                      fill="currentColor"
                      viewBox="0 0 20 20"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"
                      ></path>
                    </svg>
                    {{ address.phoneNumber }}
                  </p>
                  <div class="flex gap-2">
                    <button
                      type="button"
                      class="text-sm font-medium text-primary-600 hover:text-primary-500 dark:text-primary-500 dark:hover:text-primary-400"
                    >
                      Edit
                    </button>
                    @if (!address.isDefault) {
                      <button
                        type="button"
                        class="text-sm font-medium text-red-600 hover:text-red-500 dark:text-red-500 dark:hover:text-red-400"
                      >
                        Delete
                      </button>
                    }
                  </div>
                </div>
              </div>
            </div>
          </div>
        </label>
      </div>
    }

    <!-- Add New Address Button -->
    <button
      type="button"
      (click)="addNewAddress()"
      class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg hover:border-primary-500 dark:hover:border-primary-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all duration-200 min-h-[140px]"
    >
      <svg
        class="w-10 h-10 text-gray-400 dark:text-gray-500 mb-2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 6v6m0 0v6m0-6h6m-6 0H6"
        ></path>
      </svg>
      <span class="text-sm font-medium text-gray-700 dark:text-gray-300">Add New Address</span>
      <span class="text-xs text-gray-500 dark:text-gray-400 mt-1"
        >Click to add a new delivery address</span
      >
    </button>
  </div>
</div>
