<div class="space-y-6">
  <div>
    <h3 class="text-xl font-semibold text-gray-900 dark:text-white">Delivery Methods</h3>
  </div>

  @if (checkoutService.availableShippingMethods().length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      @for (method of checkoutService.availableShippingMethods(); track method.id) {
        <div class="relative">
          <input
            type="radio"
            name="selectedShippingMethod"
            [id]="'shipping-' + method.id"
            [value]="method.id"
            [checked]="method.id === selectedShippingMethodId()"
            (change)="selectShippingMethod(method)"
            class="absolute top-4 left-4 h-5 w-5 text-primary-600 border-gray-300 focus:ring-primary-500 dark:focus:ring-primary-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600"
          />

          <label
            [for]="'shipping-' + method.id"
            class="block p-4 border rounded-lg cursor-pointer transition-all duration-200 hover:border-primary-500 dark:hover:border-primary-400"
          >
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <div class="flex items-center justify-between mb-2">
                  <div class="flex items-center ml-6">
                    @if (method.icon) {
                      <img
                        [src]="method.icon"
                        [alt]="method.shortName"
                        class="h-8 w-8 rounded-full object-contain mr-3"
                      />
                    }
                    <h4 class="font-medium text-gray-900 dark:text-white">
                      {{ method.shortName }}
                    </h4>
                  </div>
                  <span class="font-bold text-lg text-gray-900 dark:text-white">
                    ${{ method.price.toFixed(2) }}
                  </span>
                </div>

                <div class="space-y-2 text-sm text-gray-600 dark:text-gray-400">
                  <p class="flex items-center gap-1">
                    <svg
                      class="w-4 h-4"
                      fill="currentColor"
                      viewBox="0 0 20 20"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <path
                        fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
                        clip-rule="evenodd"
                      ></path>
                    </svg>
                    <span class="font-medium">Delivery:</span> {{ method.deliveryTime }}
                  </p>

                  <p>{{ method.description }}</p>
                </div>
              </div>
            </div>
          </label>
        </div>
      }
    </div>
  } @else {
    <div
      class="text-center py-8 border border-dashed border-gray-300 dark:border-gray-700 rounded-lg"
    >
      <svg
        class="mx-auto h-12 w-12 text-gray-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
        ></path>
      </svg>
      <h3 class="mt-2 text-sm font-medium text-gray-900 dark:text-white">
        No shipping methods available
      </h3>
      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
        Please check your address or try again later.
      </p>
    </div>
  }
</div>
