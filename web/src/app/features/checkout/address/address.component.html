<form [formGroup]="addressForm" (ngSubmit)="onSubmit()" class="space-y-4">
  <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
    <div>
      <label for="fullName" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> Full Name* </label>
      <input type="text" id="fullName" formControlName="fullName"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="Bonnie Green" required />
    </div>

    <div>
      <label for="phoneNumber" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> Phone Number* </label>
      <input type="text" id="phoneNumber" formControlName="phoneNumber"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="123-456-7890" required />
    </div>

    <div class="sm:col-span-2">
      <label for="line1" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> Address Line 1* </label>
      <input type="text" id="line1" formControlName="line1"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="123 Main St" required />
    </div>

    <div class="sm:col-span-2">
      <label for="line2" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> Address Line 2 </label>
      <input type="text" id="line2" formControlName="line2"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="Apt 4B" />
    </div>

    <div>
      <label for="city" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> City* </label>
      <input type="text" id="city" formControlName="city"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="San Francisco" required />
    </div>

    <div>
      <label for="state" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> State* </label>
      <input type="text" id="state" formControlName="state"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="California" required />
    </div>

    <div>
      <label for="zipCode" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> Zip Code* </label>
      <input type="text" id="zipCode" formControlName="zipCode"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="94101" required />
    </div>

    <div>
      <label for="country" class="mb-2 block text-sm font-medium text-gray-900 dark:text-white"> Country* </label>
      <input type="text" id="country" formControlName="country"
        class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500"
        placeholder="United States" required />
    </div>

    <div class="flex items-center sm:col-span-2">
      <input id="isDefault" type="checkbox" formControlName="isDefault"
        class="h-4 w-4 rounded border-gray-300 bg-gray-100 text-primary-600 focus:ring-2 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-primary-600" />
      <label for="isDefault" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">Set as default address</label>
    </div>

    <div class="sm:col-span-2">
      <button type="submit" [disabled]="addressForm.invalid"
        class="flex w-full items-center justify-center gap-2 rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-900 hover:bg-gray-100 hover:text-primary-700 focus:z-10 focus:outline-none focus:ring-4 focus:ring-gray-100 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white dark:focus:ring-gray-700 disabled:opacity-50">
        <svg class="h-5 w-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14m-7 7V5" />
        </svg>
        Add new address
      </button>
    </div>
  </div>
</form>
