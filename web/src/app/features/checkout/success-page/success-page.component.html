<section class="bg-white py-8 antialiased dark:bg-gray-900 md:py-16 min-h-[70vh] flex items-center">
  <div class="mx-auto max-w-2xl px-4 2xl:px-0 text-center">
    <div class="mb-4 flex justify-center">
      <div class="flex h-20 w-20 items-center justify-center rounded-full bg-green-100 dark:bg-green-900 shadow-sm">
        <svg class="h-10 w-10 text-green-600 dark:text-green-300" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11.917 9.724 16.5 19 7.5" />
        </svg>
      </div>
    </div>

    <h2 class="mb-2 text-2xl font-bold text-gray-900 dark:text-white sm:text-3xl">
      Thank you for your order!
    </h2>
    <p class="mb-6 text-gray-500 dark:text-gray-400 md:mb-8 text-lg">
      Your order has been successfully placed. We'll send you a shipping confirmation email as soon as your order ships.
    </p>

    <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-6 mb-8 text-left max-w-md mx-auto border border-gray-200 dark:border-gray-700">
      <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-2">What happens next?</h3>
      <ul class="space-y-3 text-sm text-gray-600 dark:text-gray-400">
        <li class="flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600 dark:text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Order confirmation email sent
        </li>
        <li class="flex items-center gap-2">
          <svg class="w-4 h-4 text-primary-600 dark:text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
          Processing your items
        </li>
        <li class="flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Preparing for shipment
        </li>
      </ul>
    </div>

    <div class="flex flex-col items-center justify-center gap-4 sm:flex-row">
      <button routerLink="/products" class="w-full sm:w-auto rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-900 hover:bg-gray-100 hover:text-primary-700 focus:z-10 focus:outline-none focus:ring-4 focus:ring-gray-100 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white dark:focus:ring-gray-700 transition-colors">
        Continue Shopping
      </button>

      <button routerLink="/orders" class="w-full sm:w-auto rounded-lg bg-primary-700 px-5 py-2.5 text-sm font-medium text-white hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800 transition-colors">
        View Order Details
      </button>
    </div>
  </div>
</section>
