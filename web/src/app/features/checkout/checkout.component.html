<div class="my-container">
  <section class="py-4 antialiased dark:bg-gray-900 md:py-8">
    <div class="mx-auto max-w-7xl px-4 2xl:px-0">
      <div class="mt-6 md:gap-6 lg:flex lg:items-start xl:gap-8">
        <div class="mx-auto w-full flex-none lg:max-w-2xl xl:max-w-4xl">
          <mat-stepper #stepper class="bg-white border border-gray-200 shadow-sm rounded-lg">
            <mat-step label="Shipping">
              @if (accountService.currentUser()?.addresses == null || accountService.currentUser()?.addresses?.length == 0 || isEditingAddress()) {
                <app-address 
                  [addressToEdit]="addressToEdit()"
                  (cancel)="cancelEdit()"
                  (saveSuccess)="onSaveAddressSuccess()">
                </app-address>
              } @else {
                <app-address-list 
                  (addAddress)="onAddAddress()"
                  (editAddress)="onEditAddress($event)">
                </app-address-list>
                <app-shipping></app-shipping>
              }
              <div class="mt-6 flex items-center justify-end p-4 border-t border-gray-200 dark:border-gray-700">
                <button
                  matStepperNext
                  type="button"
                  [disabled]="!accountService.selectedAddress() || !checkoutService.selectedShippingMethod()"
                  class="rounded-lg bg-primary-700 px-5 py-2.5 text-sm font-medium text-white hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Next to Payment
                </button>
              </div>
            </mat-step>
            <mat-step label="Payment ">
              <app-payment-method></app-payment-method>
              <div class="mt-6 flex items-center justify-between p-4 border-t border-gray-200 dark:border-gray-700">
                <button
                  matStepperPrevious
                  type="button"
                  class="rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-900 hover:bg-gray-100 hover:text-primary-700 focus:z-10 focus:outline-none focus:ring-4 focus:ring-gray-100 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white dark:focus:ring-gray-700"
                >
                  Back to Shipping
                </button>
                <button
                  matStepperNext
                  type="button"
                  [disabled]="!checkoutService.selectedPaymentMethod()"
                  class="rounded-lg bg-primary-700 px-5 py-2.5 text-sm font-medium text-white hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800 disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  Next to Review
                </button>
              </div>
            </mat-step>
            <mat-step label="Review">
              <app-order-review></app-order-review>
              <div class="mt-6 flex items-center justify-between p-4 border-t border-gray-200 dark:border-gray-700">
                <button
                  matStepperPrevious
                  type="button"
                  class="rounded-lg border border-gray-200 bg-white px-5 py-2.5 text-sm font-medium text-gray-900 hover:bg-gray-100 hover:text-primary-700 focus:z-10 focus:outline-none focus:ring-4 focus:ring-gray-100 dark:border-gray-600 dark:bg-gray-800 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white dark:focus:ring-gray-700"
                >
                  Back to Payment
                </button>
              </div>
            </mat-step>
          </mat-stepper>
        </div>
        <div class="mx-auto mt-6 max-w-4xl flex-1 space-y-6 lg:mt-0 lg:w-full">
          <app-app-order-summary></app-app-order-summary>
        </div>
      </div>
    </div>
  </section>
</div>
