<div class="space-y-4 mb-4">
  <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Select Payment Method</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (method of this.checkoutService.paymentMethods(); track method.id) {
      <label class="flex cursor-pointer items-center justify-between rounded-lg border border-gray-200 bg-white p-4 transition-all hover:bg-gray-50 has-[:checked]:border-primary-600 has-[:checked]:bg-primary-50/10 has-[:checked]:ring-1 has-[:checked]:ring-primary-600 dark:border-gray-700 dark:bg-gray-800 dark:hover:bg-gray-700 dark:has-[:checked]:bg-gray-800"
      [ngClass]="{
          'cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 has-[:checked]:border-primary-600 has-[:checked]:bg-primary-50/10 has-[:checked]:ring-1 has-[:checked]:ring-primary-600 dark:has-[:checked]:bg-gray-800': method.isAvailable,
          'opacity-50 cursor-not-allowed grayscale': !method.isAvailable
        }">
      <div class="flex items-center gap-4">
        <input type="radio"
           [value]="method.id"
           [checked]="method.id === this.checkoutService.selectedPaymentMethod()"
           (change)="selectPaymentMethod(method.id)"
           name="payment"
           [disabled]="!method.isAvailable"
           class="h-4 w-4 border-gray-300 bg-gray-100 text-primary-600 focus:ring-2 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-primary-600" />
        <img src="{{method.icon}}" alt="{{method.name}}" class="h-8 w-8">
        <span class="font-medium text-gray-900 dark:text-white">{{ method.name }}</span>
      </div>
    </label>
    }
  </div>

  <!-- Additional payment information -->
  <div class="mt-6 p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
    <h3 class="text-sm font-medium text-gray-900 dark:text-white mb-2">Payment Security</h3>
    <p class="text-sm text-gray-600 dark:text-gray-400">
      All payments are processed securely. We use industry-standard encryption to protect your
      payment information. Your card details are never stored on our servers.
    </p>
  </div>
</div>
