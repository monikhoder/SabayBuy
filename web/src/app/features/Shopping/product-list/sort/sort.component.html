<mat-menu #sortMenu="matMenu">
  @for (sort of sortOptions; track sort.value) {
    <button mat-menu-item (click)="onSortChange(sort.value)">
      <mat-icon [class.text-primary-600]="selectedSort === sort.value">
        {{ selectedSort === sort.value ? 'check' : '' }}
      </mat-icon>
      <span>{{ sort.name }}</span>
    </button>
  }
</mat-menu>
