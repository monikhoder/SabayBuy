<section class="bg-white antialiased p-2">
      <div class="w-full p-2">
        <div class="mb-4 items-center justify-between md:flex md:space-x-4">
          <form class="w-full flex-1 md:mr-4 md:max-w-md" (submit)="$event.preventDefault()">
            <label for="default-search" class="sr-only text-sm font-medium text-gray-900 dark:text-white">Search</label>
            <div class="relative">
              <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                <svg aria-hidden="true" class="h-4 w-4 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
              </div>
               <input #search type="search" id="default-search" (input)="onSearch(search.value)" (keyup.enter)="onSearch(search.value)" class="block w-full rounded-lg border border-gray-300 bg-gray-50 p-2 pl-10 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500" placeholder="Search by Order ID" />
               <button type="button" (click)="onSearch(search.value)" class="absolute bottom-0 right-0 top-0 rounded-r-lg bg-primary-700 px-4 py-2 text-sm font-medium text-white hover:bg-primary-800 focus:outline-none focus:ring-4 focus:ring-primary-300 dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">Search</button>
            </div>
          </form>
           <div class="mt-4 items-center space-y-4 sm:flex sm:space-x-4 sm:space-y-0 md:mt-0">
            <div>
              <label for="order-type" class="sr-only mb-2 block text-sm font-medium text-gray-900 dark:text-white">Select order type</label>
              <select id="order-type" [(ngModel)]="orderParams.status" (change)="onFilterChange()" class="block w-full min-w-[8rem] rounded-lg border border-gray-300 bg-gray-50 p-2.5 text-sm text-gray-900 focus:border-primary-500 focus:ring-primary-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white dark:placeholder:text-gray-400 dark:focus:border-primary-500 dark:focus:ring-primary-500">
                <option value="">All orders</option>
                <option value="Pending">Pending</option>
                <option value="PaymentReceived">Payment Received</option>
                <option value="OrderConfirm">Order Confirm</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
                <option value="ReceivedOrder">Received Order</option>
                <option value="Cancelled">Cancelled</option>
                <option value="PaymentFailed">Payment Failed</option>
                <option value="Refunded">Refunded</option>
              </select>
            </div>
            <mat-paginator [length]="totalItems"
                        [pageSize]="orderParams.pageSize"
                        [pageIndex]="orderParams.pageIndex - 1"
                        [pageSizeOptions]="[5, 10, 15, 25, 100]"
                        (page)="handlePageEvent($event)"
                        aria-label="Select page"
                        >
            </mat-paginator>
          </div>
        </div>
        <div class="p-2">
            @for (order of orders; track order) {
              <app-order-card 
                [order]="order"
                (statusUpdate)="updateOrderStatus($event.orderId, $event.currentStatus, $event.paymentMethod)">
              </app-order-card>
            }
        </div>
    </div>
</section>
