<section class="bg-white dark:bg-gray-900 ">
    <div class="">

        <div class="flex  flex-col justify-between p-2 dark:bg-gray-800 relative shadow-md sm:rounded-lg overflow-hidden">
            <div class="flex flex-col md:flex-row items-center justify-between space-y-3 md:space-y-0 md:space-x-4 p-4">
                <div class="w-full md:max-w-md">
                    <app-admin-search placeholder="Search users by email or name" (search)="onSearch($event)"></app-admin-search>
                </div>
                <div class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3 ">

                    <mat-paginator [length]="totalItems"
                                [pageSize]="userParams.pageSize"
                                [pageIndex]="userParams.pageIndex - 1"
                                [pageSizeOptions]="[5, 10, 15, 25, 100]"
                                (page)="handlePageEvent($event)"
                                aria-label="Select page"
                                >
                    </mat-paginator>

                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500 dark:text-gray-400">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                        <tr>
                            <th scope="col" class="px-4 py-4">Avatar</th>
                            <th scope="col" class="px-4 py-4">Name</th>
                            <th scope="col" class="px-4 py-4">Email</th>
                            <th scope="col" class="px-4 py-4">Role</th>
                            <th scope="col" class="px-4 py-4">Addresses</th>
                            <th scope="col" class="px-4 py-4 ">Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        @for (user of users; track user.id) {
                            <tr class="border-b border-gray-200">
                                <th scope="row" class="px-4 py-3 font-medium text-gray-900 whitespace-nowrap dark:text-white">
                                    @if (user.profileUrl) {
                                        <img [src]="user.profileUrl" alt="Avatar" class="w-10 h-10 rounded-full object-cover">
                                    }@else {
                                        <div class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold">
                                            {{user.firstName[0]}}{{user.lastName[0]}}
                                        </div>
                                    }

                                </th>
                                <td class="px-4 py-3">{{ user.firstName }} {{ user.lastName }}</td>
                                <td class="px-4 py-3">{{ user.email }}</td>
                                <td class="px-4 py-3">
                                    <app-admin-badge [label]="user.role"></app-admin-badge>
                                </td>
                                <td class="px-4 py-3">{{ user.addresses?.length || 0 }}</td>
                                <td class="px-4 py-3 flex p-1 gap-6">
                                    <button type="button" (click)="openPromoteDialog(user)" class="text-violet-500 hover:text-violet-700" title="Promote User">
                                        <mat-icon >manage_accounts</mat-icon>
                                   </button>
                                </td>
                            </tr>
                        }
                        @if (users.length === 0) {
                            <tr>
                                <td colspan="6" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">
                                    No users found.
                                </td>
                            </tr>
                        }
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</section>
