<section class="bg-gray-50 dark:bg-gray-900">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto mt-12 lg:py-1">
    <div
      class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700"
    >
      <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
        <h1
          class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white"
        >
          Create an account
        </h1>
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-4 md:space-y-6">
          <app-text-input
            formControlName="firstName"
            label="First Name"
            placeholder="Sok"
            [type]="'text'"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['firstName']"
          ></app-text-input>

          <app-text-input
            formControlName="lastName"
            label="Last Name"
            placeholder="Pov"
            [type]="'text'"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['lastName']"
          ></app-text-input>

          <app-text-input
            formControlName="email"
            label="Email"
            placeholder="yourname@company.com"
            [type]="'email'"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['email']"
          ></app-text-input>

          <app-text-input
            formControlName="password"
            label="Password"
            placeholder="••••••••"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['password']"
          ></app-text-input>

          <div class="flex items-center justify-between">
            <div class="flex items-start">
              <div class="flex items-center h-5">
                <input
                  id="remember"
                  aria-describedby="remember"
                  type="checkbox"
                  class="w-4 h-4 border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-primary-300 dark:bg-gray-700 dark:border-gray-600 dark:focus:ring-primary-600 dark:ring-offset-gray-800"
                  required=""
                />
              </div>
              <div class="ml-3 text-sm">
                <label for="remember" class="text-gray-500 dark:text-gray-300">I accept the </label>
                <a>Terms and Conditions</a>
              </div>
            </div>
          </div>
          <div>
            @if (validationErrors.general) {
              @for (error of validationErrors.general; track $index) {
                <div class="text-red-500 text-sm mt-1">
                  {{ error }}
                </div>
              }
            }
          </div>
          <button
          [disabled]="registerForm.invalid"
            type="submit"
            class="w-full text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 disabled:opacity-50 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800"
          >
            Create an account
          </button>
          <p class=" text-sm font-light text-gray-500 dark:text-gray-400">
            Already have an account?
            <a
              routerLink="/account/login"
              class="cursor-pointer font-medium text-primary-600 hover:underline dark:text-primary-500">
              Login
            </a>
          </p>
        </form>
      </div>
    </div>
  </div>
</section>
