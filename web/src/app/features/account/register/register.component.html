<section class="bg-gray-50">
  <div class="mx-auto mt-12 flex flex-col items-center justify-center px-6 py-8 lg:py-1">
    <div class="app-panel w-full sm:max-w-md">
      <div class="space-y-6 p-6 sm:p-8">
        <h1 class="text-2xl font-bold leading-tight tracking-tight text-gray-900">
          Create an account
        </h1>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <app-text-input
            formControlName="firstName"
            label="First Name"
            placeholder="Sok"
            [type]="'text'"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['firstName']"
          ></app-text-input>

          <app-text-input
            formControlName="lastName"
            label="Last Name"
            placeholder="Pov"
            [type]="'text'"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['lastName']"
          ></app-text-input>

          <app-text-input
            formControlName="email"
            label="Email"
            placeholder="yourname@company.com"
            [type]="'email'"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['email']"
          ></app-text-input>

          <app-text-input
            formControlName="password"
            label="Password"
            placeholder="Create a password"
            [IsRequired]="true"
            [validatorErrors]="validationErrors['password']"
          ></app-text-input>

          <div class="flex items-center justify-between">
            <div class="flex items-start">
              <div class="flex h-5 items-center">
                <input
                  id="remember"
                  aria-describedby="remember"
                  type="checkbox"
                  class="h-4 w-4 rounded border border-gray-300 bg-gray-50"
                  required=""
                />
              </div>
              <div class="ml-3 text-sm text-gray-500">
                <label for="remember">I accept the </label>
                <a href="#" class="app-link">Terms and Conditions</a>
              </div>
            </div>
          </div>

          <div>
            @if (validationErrors.general) {
              @for (error of validationErrors.general; track $index) {
                <div class="mt-1 text-sm text-red-500">
                  {{ error }}
                </div>
              }
            }
          </div>

          <button [disabled]="registerForm.invalid" type="submit" class="app-btn-primary w-full">
            Create an account
          </button>

          <p class="text-sm font-light text-gray-500">
            Already have an account?
            <a routerLink="/account/login" class="app-link">Login</a>
          </p>
        </form>
      </div>
    </div>
  </div>
</section>
